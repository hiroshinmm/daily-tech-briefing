name: Daily Tech Briefing Generator

on:
  schedule:
    # 毎日 日本時間(JST) 朝8:00 に実行 (UTCでは 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行用ボタン

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # カテゴリ並列処理数。Gemini APIレートリミットに応じて調整する (フリー枠15RPM対応で2に設定)
  INSIGHT_CONCURRENCY: 2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Allow pushing to the repository for Pages
    # Required permissions for GitHub Pages
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ランナーにプリキャッシュされたChromeが不完全(フォルダはあるが実行ファイルが
      # 欠落)でインストーラーがスキップしてしまうことがあるため、キャッシュを
      # 削除してからインストールする。インストーラーがzipのダウンロードのみで
      # 展開を完了せず正常終了することがあるため、実行ファイルが無ければ
      # zipを手動展開して補完する
      - name: Install Chrome for Puppeteer
        run: |
          rm -rf "$HOME/.cache/puppeteer"
          node ./node_modules/puppeteer/lib/cjs/puppeteer/node/cli.js browsers install chrome || true
          for d in "$HOME"/.cache/puppeteer/chrome/linux-*/; do
            if [ ! -x "$d/chrome-linux64/chrome" ]; then
              zip=$(ls "$d"*.zip 2>/dev/null | head -1)
              if [ -n "$zip" ]; then
                unzip -o -q "$zip" -d "$d"
                chmod +x "$d/chrome-linux64/chrome"
              fi
            fi
          done
          find "$HOME/.cache/puppeteer/chrome" -maxdepth 3 -name chrome -type f -exec ls -la {} \;

      # Step 1: Fetch News
      - name: Fetch News
        run: node src/fetchNews.js

      # Step 2: Generate Insights via Gemini API
      - name: Generate Insights
        run: node src/generateInsights.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSIGHT_CONCURRENCY: ${{ env.INSIGHT_CONCURRENCY }}

      # Step 3: Download Images & Generate Web Gallery (アーカイブ90日クリーンアップも含む)
      - name: Process Images and Gallery
        run: node src/generateGallery.js

      # Step 4: Setup, Build and Deploy to GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Step 5: Send Email Notification
      - name: Send Notification
        run: node src/sendNotification.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GITHUB_PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      # Step 6: Commit and Push Archives (新規追加 + 90日超の削除済みファイルを含む)
      - name: Commit and push archives
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A -- data/archives/
          git add data/seen_articles.json || true
          git commit -m "chore: archive daily insights [skip ci]" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push

      # Step 7: 失敗時通知 (いずれかのステップが失敗した場合のみ実行)
      - name: Notify on failure
        if: failure()
        run: node src/sendFailureNotification.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          FAILED_JOB: "${{ github.job }}"
